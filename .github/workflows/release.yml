name: Release

on:
  push:
    tags:
      - 'v*'

# Publish a GitHub Release and upload signed/notarized DMG + ZIP artifacts
# when a version tag (e.g. v0.2.0) is pushed.
#
# Required GitHub repository secrets:
#   CERTIFICATE_P12         — base64-encoded Developer ID Application .p12
#                             Generate: base64 < cert.p12 | tr -d '\n'
#   CERTIFICATE_PASSWORD    — password for the .p12
#   APPLE_ID                — Apple ID email used for notarization
#   APPLE_APP_SPECIFIC_PASSWORD — app-specific password from appleid.apple.com
#   APPLE_TEAM_ID           — 10-character Team ID from developer.apple.com
#   (GITHUB_TOKEN is provided automatically)

jobs:
  build:
    runs-on: macos-14   # Apple Silicon — can cross-compile x64 too
    name: Build (arm64 + x64)

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: electron/package-lock.json

      # node-gyp needs Python distutils (removed in Python 3.12); restore it
      # --break-system-packages required on macOS runners with PEP 668 Homebrew Python
      - name: Install Python setuptools
        run: pip3 install --break-system-packages setuptools

      # ── Install Electron dependencies ─────────────────────────────────────
      # --ignore-scripts: skip better-sqlite3's own postinstall build so it doesn't
      # compile against the system Node ABI. electron-builder's @electron/rebuild
      # compiles it against the correct Electron ABI instead (see electronRebuild below).
      - name: Install dependencies
        run: npm ci --ignore-scripts
        working-directory: electron

      # ── Import Developer ID certificate into an ephemeral keychain ────────
      - name: Import signing certificate
        env:
          CERTIFICATE_P12: ${{ secrets.CERTIFICATE_P12 }}
          CERTIFICATE_PASSWORD: ${{ secrets.CERTIFICATE_PASSWORD }}
        run: |
          KEYCHAIN_PATH="$RUNNER_TEMP/build.keychain"
          CERT_PATH="$RUNNER_TEMP/certificate.p12"
          echo "$CERTIFICATE_P12" | base64 --decode > "$CERT_PATH"
          security create-keychain -p "" "$KEYCHAIN_PATH"
          security set-keychain-settings -t 3600 -u "$KEYCHAIN_PATH"
          security unlock-keychain -p "" "$KEYCHAIN_PATH"
          security import "$CERT_PATH" -k "$KEYCHAIN_PATH" -P "$CERTIFICATE_PASSWORD" \
            -T /usr/bin/codesign -T /usr/bin/security
          security set-key-partition-list -S apple-tool:,apple: -s -k "" "$KEYCHAIN_PATH"
          security list-keychains -d user -s "$KEYCHAIN_PATH" $(security list-keychains -d user | tr -d '"')
          rm "$CERT_PATH"

      # ── Ensure sqlite-vec x64 dylib is present for x64 packaging ───────────
      # The CI runner is arm64, so npm ci only installs sqlite-vec-darwin-arm64.
      # The x64 DMG (and any arm64 user running the x64 build under Rosetta) needs
      # sqlite-vec-darwin-x64. npm pack bypasses cpu/os restrictions, so we use it
      # to download and manually unpack the x64 variant alongside the arm64 one.
      - name: Install sqlite-vec-darwin-x64 (cross-arch, for x64 DMG)
        run: |
          VEC_VER=$(node -pe "require('./node_modules/sqlite-vec/package.json').optionalDependencies['sqlite-vec-darwin-x64']")
          npm pack "sqlite-vec-darwin-x64@${VEC_VER}" --pack-destination /tmp
          mkdir -p node_modules/sqlite-vec-darwin-x64
          tar -xzf "/tmp/sqlite-vec-darwin-x64-${VEC_VER}.tgz" -C node_modules/sqlite-vec-darwin-x64 --strip-components=1
          echo "Installed sqlite-vec-darwin-x64@${VEC_VER}"
          file node_modules/sqlite-vec-darwin-x64/vec0.dylib
        working-directory: electron

      # ── Build a universal better-sqlite3 binary (works on arm64 + x64) ───
      # Compile for each arch separately, then lipo-merge into a fat binary.
      # Both DMGs ship the same universal .node so there's no per-arch packaging
      # complexity and electron-builder can't substitute the wrong prebuilt.
      - name: Rebuild better-sqlite3 for Electron (arm64)
        run: npx @electron/rebuild -f -o better-sqlite3 --arch arm64
        working-directory: electron

      - name: Save arm64 better-sqlite3 binary
        run: cp electron/node_modules/better-sqlite3/build/Release/better_sqlite3.node /tmp/better_sqlite3_arm64.node

      - name: Rebuild better-sqlite3 for Electron (x64)
        run: npx @electron/rebuild -f -o better-sqlite3 --arch x64
        working-directory: electron

      - name: Merge into universal binary with lipo
        run: |
          lipo -create \
            /tmp/better_sqlite3_arm64.node \
            electron/node_modules/better-sqlite3/build/Release/better_sqlite3.node \
            -output electron/node_modules/better-sqlite3/build/Release/better_sqlite3.node
          echo "better_sqlite3.node arch:"
          file electron/node_modules/better-sqlite3/build/Release/better_sqlite3.node

      # ── Build both DMGs in one invocation to avoid duplicate asset uploads ──
      # Two separate steps each upload shared files (e.g. latest-mac.yml,
      # mac.zip.blockmap) causing GitHub to return 422 on the second upload.
      # Building arm64 + x64 together means each asset is uploaded exactly once.
      - name: Build and publish (arm64 + x64)
        env:
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_APP_SPECIFIC_PASSWORD: ${{ secrets.APPLE_APP_SPECIFIC_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: npm run dist:mac
        working-directory: electron
