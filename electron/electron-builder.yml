appId: com.qmd-ui.app
productName: qmd-ui
copyright: "qmd-ui contributors"

# ── What goes inside the asar archive ────────────────────────────────────────
files:
  - main.js
  - preload.js
  - setup.html
  - prefs.html
  - assets/**
  # Strip packages that are large and not needed for basic search/indexing:
  # node-llama-cpp — only used by `qmd embed` with a local LLM model (optional feature)
  - "!**/node_modules/node-llama-cpp/**"
  - "!**/node_modules/@node-llama-cpp/**"
  # typescript — compiler, never needed at runtime
  - "!**/node_modules/typescript/**"
  # better-sqlite3 build sources — keep only the compiled .node binary
  - "!**/node_modules/better-sqlite3/deps/**"
  - "!**/node_modules/better-sqlite3/src/**"
  - "!**/node_modules/better-sqlite3/binding.gyp"

# ── Outside asar so the qmd child process (ELECTRON_RUN_AS_NODE) can open them
asarUnpack:
  # qmd JS source — child process can't read from inside .asar
  - "node_modules/@tobilu/**"
  # Native .node addon — must be on real FS
  - "**/node_modules/better-sqlite3/build/**"
  # sqlite-vec platform dylibs — loaded via db.loadExtension()
  - "**/node_modules/sqlite-vec-darwin-arm64/**"
  - "**/node_modules/sqlite-vec-darwin-x64/**"
  # tree-sitter WASM grammars — read from disk at runtime
  - "**/node_modules/web-tree-sitter/**"
  - "**/node_modules/tree-sitter-typescript/**"
  - "**/node_modules/tree-sitter-python/**"
  - "**/node_modules/tree-sitter-go/**"
  - "**/node_modules/tree-sitter-rust/**"

# ── Files placed in Resources/ outside the asar ──────────────────────────────
extraResources:
  # Web server + UI (referenced by main.js via process.resourcesPath)
  - from: ../server.mjs
    to: server.mjs
  - from: ../index.html
    to: index.html

# ── Native module rebuild ─────────────────────────────────────────────────────
# Only rebuild better-sqlite3 for Electron's Node ABI.
# tree-sitter-* have native bindings but we use their WASM files via web-tree-sitter.
# node-llama-cpp is excluded from the bundle entirely (see files above).
electronRebuild:
  onlyModules:
    - better-sqlite3

# ── macOS ─────────────────────────────────────────────────────────────────────
mac:
  category: public.app-category.productivity
  hardenedRuntime: true
  entitlements: build/entitlements.mac.plist
  entitlementsInherit: build/entitlements.mac.plist
  # Notarize after signing — requires APPLE_ID + APPLE_APP_SPECIFIC_PASSWORD env vars
  notarize: true
  target:
    - target: dmg
      arch: [arm64, x64]
    - target: zip    # electron-updater needs the zip for delta updates
      arch: [arm64, x64]

dmg:
  background: null
  window:
    width: 540
    height: 380

# ── Auto-update via GitHub Releases ──────────────────────────────────────────
publish:
  provider: github
  owner: pushdrop
  repo: qmd-ui
