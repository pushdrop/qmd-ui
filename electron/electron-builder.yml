appId: com.qmd-ui.app
productName: qmd-ui
copyright: "qmd-ui contributors"

# ── What goes inside the asar archive ────────────────────────────────────────
files:
  - main.js
  - preload.js
  - setup.html
  - prefs.html
  - assets/**

# ── Files placed in Resources/ outside the asar ──────────────────────────────
extraResources:
  # Web server + UI (referenced by main.js via process.resourcesPath)
  - from: ../server.mjs
    to: server.mjs
  - from: ../index.html
    to: index.html

# ── macOS ─────────────────────────────────────────────────────────────────────
mac:
  category: public.app-category.productivity
  hardenedRuntime: true
  entitlements: build/entitlements.mac.plist
  entitlementsInherit: build/entitlements.mac.plist
  # Notarize after signing — requires APPLE_ID + APPLE_APP_SPECIFIC_PASSWORD env vars
  notarize: true
  target:
    - target: dmg
      arch: [arm64, x64]
    - target: zip    # electron-updater needs the zip for delta updates
      arch: [arm64, x64]

dmg:
  background: null
  window:
    width: 540
    height: 380

# ── Auto-update via GitHub Releases ──────────────────────────────────────────
publish:
  provider: github
  owner: pushdrop
  repo: qmd-ui
