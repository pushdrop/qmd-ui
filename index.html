<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>qmd</title>
<script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/github-markdown-css/5.5.0/github-markdown.min.css">
<style>
  :root {
    color-scheme: light dark;
    --bg: #ffffff;
    --panel: #fafafa;
    --border: #e4e4e7;
    --text: #18181b;
    --dim: #71717a;
    --accent: #2f7df6;
    --sel-bg: #f4f4f5;
    --mono: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, monospace;
  }
  @media (prefers-color-scheme: dark) {
    :root {
      --bg: #0d0d0f;
      --panel: #121214;
      --border: #26262b;
      --text: #e4e4e7;
      --dim: #76767f;
      --accent: #5e9eff;
      --sel-bg: #1b1b20;
    }
  }
  * { box-sizing: border-box; }
  body {
    margin: 0;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
    font-size: 13px;
    background: var(--bg);
    color: var(--text);
    height: 100vh;
    display: flex;
    flex-direction: column;
    overflow: hidden;
    -webkit-font-smoothing: antialiased;
  }
  kbd {
    font-family: var(--mono);
    font-size: 10px;
    color: var(--dim);
    border: 1px solid var(--border);
    border-radius: 3px;
    padding: 1px 4px;
    background: var(--panel);
  }

  /* ── header ─────────────────────────────── */
  #header {
    display: flex;
    align-items: center;
    gap: 8px;
    padding: 10px 16px;
    border-bottom: 1px solid var(--border);
    transition: padding 0.25s ease;
  }
  #searchBox {
    flex: 1;
    font-size: 16px;
    font-family: inherit;
    padding: 6px 0;
    border: none;
    background: transparent;
    color: inherit;
    outline: none;
    caret-color: var(--accent);
    transition: font-size 0.25s ease;
  }
  #searchBox::placeholder { color: var(--dim); }

  /* ── landing (no query) ─────────────────── */
  body.landing #main { display: none; }
  body.landing #header {
    position: absolute;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    width: min(600px, 90vw);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 14px 18px;
    box-shadow: 0 4px 24px rgba(0,0,0,0.12);
    background: var(--bg);
  }
  body.landing #hints { display: none; }
  body.landing #searchBox { font-size: 20px; }
  #toast {
    position: fixed;
    bottom: 24px;
    left: 50%;
    transform: translateX(-50%);
    background: var(--text);
    color: var(--bg);
    border-radius: 8px;
    padding: 10px 18px;
    font-size: 12px;
    max-width: min(560px, 90vw);
    white-space: pre-wrap;
    word-break: break-word;
    box-shadow: 0 4px 16px rgba(0,0,0,0.25);
    opacity: 0;
    pointer-events: none;
    transition: opacity 0.2s;
    z-index: 999;
  }
  #toast.visible { opacity: 1; pointer-events: auto; }
  #hints {
    display: flex;
    gap: 10px;
    align-items: center;
    color: var(--dim);
    font-size: 11px;
    white-space: nowrap;
  }
  #spinner {
    display: none;
    font-family: var(--mono);
    font-size: 11px;
    color: var(--accent);
    white-space: nowrap;
  }
  .icon-btn {
    border: none;
    background: transparent;
    color: var(--dim);
    cursor: pointer;
    padding: 4px 6px;
    border-radius: 4px;
    display: flex;
    align-items: center;
    line-height: 1;
  }
  .icon-btn:hover { color: var(--text); background: var(--sel-bg); }
  .icon-btn.active { color: var(--accent); }
  body.landing #scope-wrap { display: none; }
  body.landing #sidebarToggleBtn { display: none; }

  /* ── scope picker ───────────────────────── */
  #scope-wrap { position: relative; }
  #scope-picker {
    display: none;
    position: absolute;
    right: 0;
    top: calc(100% + 4px);
    width: 340px;
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: 8px;
    box-shadow: 0 8px 32px rgba(0,0,0,.18);
    z-index: 200;
    overflow: hidden;
    flex-direction: column;
  }
  #scope-picker.open { display: flex; }
  #scope-input {
    border: none;
    border-bottom: 1px solid var(--border);
    padding: 9px 12px;
    font-size: 12px;
    font-family: inherit;
    background: var(--bg);
    color: var(--text);
    outline: none;
    width: 100%;
  }
  #scope-input::placeholder { color: var(--dim); }
  #scope-list { max-height: 300px; overflow-y: auto; }
  .scope-section {
    padding: 6px 12px 2px;
    font-size: 10px;
    color: var(--dim);
    text-transform: uppercase;
    letter-spacing: .06em;
  }
  .scope-option {
    padding: 7px 12px;
    font-size: 11px;
    font-family: var(--mono);
    cursor: pointer;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }
  .scope-option:hover { background: var(--sel-bg); }

  /* ── scope chip (status bar) ────────────── */
  #sort-ctrl {
    display: none;
    align-items: center;
    gap: 2px;
    margin-left: auto;
    flex-shrink: 0;
  }
  #sort-ctrl.visible { display: flex; }
  .sort-btn {
    background: none;
    border: 1px solid transparent;
    border-radius: 8px;
    color: var(--dim);
    font-family: var(--mono);
    font-size: 10px;
    text-transform: uppercase;
    letter-spacing: 0.06em;
    padding: 1px 6px;
    cursor: pointer;
    line-height: 1.6;
  }
  .sort-btn:hover { color: var(--text); }
  .sort-btn.active { color: var(--text); border-color: var(--border); }
  #scope-chip {
    display: none;
    align-items: center;
    gap: 3px;
    background: var(--sel-bg);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 1px 5px 1px 6px;
    margin-right: 6px;
    flex-shrink: 0;
    max-width: 180px;
  }
  #scope-chip.active { display: flex; }
  #scope-label {
    font-family: var(--mono);
    font-size: 10px;
    color: var(--text);
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
  }
  #scope-clear {
    background: none;
    border: none;
    color: var(--dim);
    cursor: pointer;
    padding: 0 0 0 2px;
    font-size: 13px;
    line-height: 1;
    flex-shrink: 0;
  }
  #scope-clear:hover { color: var(--text); }

  /* ── layout ─────────────────────────────── */
  #main { flex: 1; display: flex; min-height: 0; }
  #left {
    width: 40%;
    min-width: 200px;
    max-width: 60%;
    display: flex;
    flex-direction: column;
    background: var(--panel);
    flex-shrink: 0;
    transition: width 0.15s ease;
  }
  #left.collapsed { width: 0 !important; min-width: 0; overflow: hidden; }

  /* ── resizer ────────────────────────────── */
  #resizer {
    width: 5px;
    flex-shrink: 0;
    position: relative;
    cursor: col-resize;
    background: var(--border);
    transition: background 0.15s;
  }
  #resizer:hover, #resizer.dragging { background: var(--accent); }
  #toggle-sidebar {
    position: absolute;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    width: 18px;
    height: 36px;
    background: var(--panel);
    border: 1px solid var(--border);
    border-radius: 4px;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    color: var(--dim);
    font-size: 10px;
    opacity: 0;
    transition: opacity 0.15s, color 0.15s;
    z-index: 10;
    user-select: none;
  }
  #resizer:hover #toggle-sidebar { opacity: 1; }
  #toggle-sidebar:hover { color: var(--text); }
  #status {
    padding: 6px 16px;
    font-family: var(--mono);
    font-size: 10px;
    text-transform: uppercase;
    letter-spacing: 0.06em;
    color: var(--dim);
    border-bottom: 1px solid var(--border);
    min-height: 24px;
    display: flex;
    align-items: center;
  }
  #results { flex: 1; overflow-y: auto; }

  /* ── results ────────────────────────────── */
  .result {
    padding: 9px 16px 9px 14px;
    cursor: pointer;
    border-left: 2px solid transparent;
    border-bottom: 1px solid var(--border);
  }
  .result:hover { background: var(--sel-bg); }
  .result.selected {
    background: var(--sel-bg);
    border-left-color: var(--accent);
  }
  .result-title {
    display: flex;
    justify-content: space-between;
    align-items: baseline;
    gap: 8px;
    font-weight: 500;
    font-size: 13px;
  }
  .result-title .name {
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
  }
  .result-score {
    font-family: var(--mono);
    font-size: 10px;
    color: var(--dim);
    flex-shrink: 0;
  }
  .result-path {
    font-family: var(--mono);
    font-size: 11px;
    color: var(--dim);
    margin: 3px 0 4px;
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
  }
  .result-snippet {
    font-size: 11px;
    line-height: 1.45;
    color: var(--dim);
    white-space: pre-wrap;
    display: -webkit-box;
    -webkit-line-clamp: 2;
    -webkit-box-orient: vertical;
    overflow: hidden;
  }

  /* ── preview ────────────────────────────── */
  #preview {
    flex: 1;
    display: flex;
    flex-direction: column;
    min-width: 0;
  }
  #preview-header {
    display: none;
    align-items: center;
    gap: 6px;
    padding: 8px 14px;
    border-bottom: 1px solid var(--border);
    min-height: 38px;
  }
  #preview-path {
    font-family: var(--mono);
    font-size: 11px;
    color: var(--dim);
    flex: 1;
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
    user-select: all;
    min-width: 0;
  }
  #preview-mtime {
    font-size: 10px;
    color: var(--dim);
    white-space: nowrap;
    flex-shrink: 0;
  }
  #copyBtn {
    border: none;
    background: transparent;
    color: var(--dim);
    cursor: pointer;
    padding: 3px;
    border-radius: 4px;
    flex-shrink: 0;
    display: flex;
    align-items: center;
  }
  #copyBtn:hover { color: var(--text); background: var(--sel-bg); }
  #copyBtn.copied { color: #34d399; }
  #view-btns, #edit-btns { display: flex; gap: 5px; align-items: center; flex-shrink: 0; }
  #preview-header button:not(#copyBtn) {
    display: flex;
    align-items: center;
    gap: 5px;
    background: transparent;
    border: 1px solid var(--border);
    color: var(--text);
    padding: 3px 9px;
    border-radius: 5px;
    cursor: pointer;
    font-size: 11px;
    font-family: inherit;
    white-space: nowrap;
  }
  #preview-header button:not(#copyBtn):hover { border-color: var(--dim); background: var(--sel-bg); }
  #preview-scroll { flex: 1; overflow-y: auto; padding: 20px 24px; }
  .placeholder { color: var(--dim); font-size: 12px; }
  .error { color: #f87171; font-family: var(--mono); font-size: 12px; white-space: pre-wrap; }

  /* ── editor ─────────────────────────────── */
  #editor-mount {
    flex: 1;
    overflow: hidden;
    display: none;
  }
  #editor-mount .cm-editor {
    height: 100%;
    font-family: var(--mono);
    font-size: 13.5px;
  }
  #editor-mount .cm-focused { outline: none !important; }
  #editor-mount .cm-scroller { overflow: auto; }
  #editor-mount .cm-content { padding: 20px 24px; line-height: 1.65; }
  #editor-mount .cm-line { min-height: 1em; }
  #editor-mount .cm-panels { border-color: var(--border) !important; }
  /* Light mode — dark mode colors are handled by the oneDark CM6 theme */
  @media (prefers-color-scheme: light) {
    #editor-mount .cm-editor { background: var(--bg); color: var(--text); }
    #editor-mount .cm-gutters { background: var(--panel); border-right: 1px solid var(--border); color: var(--dim); }
    #editor-mount .cm-activeLineGutter, #editor-mount .cm-activeLine { background: var(--sel-bg); }
    #editor-mount .cm-cursor { border-left-color: var(--accent) !important; }
    #editor-mount .cm-selectionBackground { background: color-mix(in srgb, var(--accent) 25%, transparent) !important; }
    #editor-mount .cm-panels { background: var(--panel); color: var(--text); }
  }
  #save-status {
    font-family: var(--mono);
    font-size: 11px;
    color: var(--dim);
    align-self: center;
    min-width: 80px;
  }
  #save-status.ok { color: #34d399; }
  #save-status.err { color: #f87171; }

  /* ── markdown ───────────────────────────── */
  .markdown-body {
    background: transparent !important;
    color: var(--text);
    font-size: 13.5px;
  }
  .markdown-body pre { background: var(--panel) !important; border: 1px solid var(--border); border-radius: 6px; }
  .markdown-body code { font-family: var(--mono); }
  .markdown-body a { color: var(--accent); }
  .markdown-body h1, .markdown-body h2 { border-bottom-color: var(--border) !important; }

  ::-webkit-scrollbar { width: 8px; }
  ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 4px; }
  ::-webkit-scrollbar-thumb:hover { background: var(--dim); }
  ::-webkit-scrollbar-track { background: transparent; }

  /* ── status modal ───────────────────────── */
  #status-modal {
    border: 1px solid var(--border);
    border-radius: 10px;
    background: var(--bg);
    color: var(--text);
    padding: 0;
    max-width: min(480px, 90vw);
    max-height: 60vh;
    overflow: hidden;
    box-shadow: 0 8px 32px rgba(0,0,0,.25);
    min-width: 300px;
  }
  #status-modal[open] { display: flex; flex-direction: column; }
  #status-modal::backdrop { background: rgba(0,0,0,.4); }
  #status-modal-head {
    display: flex; align-items: center; justify-content: space-between;
    padding: 10px 14px; border-bottom: 1px solid var(--border);
    font-weight: 600; font-size: 12px; flex-shrink: 0;
  }
  #status-modal-close {
    background: none; border: none; cursor: pointer; color: var(--dim);
    font-size: 18px; line-height: 1; padding: 0 2px; font-family: inherit;
  }
  #status-modal-close:hover { color: var(--text); }
  #status-modal-body {
    padding: 14px; overflow-y: auto; font-family: var(--mono);
    font-size: 11px; line-height: 1.7; white-space: pre-wrap;
    color: var(--text); margin: 0; flex: 1;
  }
</style>
</head>
<body>
  <dialog id="status-modal">
    <div id="status-modal-head">
      Index Status
      <button id="status-modal-close" onclick="document.getElementById('status-modal').close()">×</button>
    </div>
    <pre id="status-modal-body">Loading…</pre>
  </dialog>
  <div id="toast"></div>
  <div id="header">
    <input type="text" id="searchBox" placeholder="Search…" autocomplete="off" spellcheck="false">
    <span id="spinner">deep search…</span>
    <div id="hints">
      <span><kbd>↩</kbd> deep</span>
      <span><kbd>↑↓</kbd> nav</span>
      <span><kbd>esc</kbd> clear</span>
    </div>
    <div id="scope-wrap">
      <button id="scopeBtn" class="icon-btn" title="Filter by folder" onclick="toggleScopePicker()">
        <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M22 19a2 2 0 0 1-2 2H4a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h5l2 3h9a2 2 0 0 1 2 2z"/></svg>
      </button>
      <div id="scope-picker">
        <input id="scope-input" type="text" placeholder="Filter folders…" autocomplete="off" spellcheck="false">
        <div id="scope-list"></div>
      </div>
    </div>
    <button class="icon-btn" onclick="runCommand('update')" title="Reindex">
      <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 12a9 9 0 0 1 9-9 9.75 9.75 0 0 1 6.74 2.74L21 8"/><path d="M21 3v5h-5"/><path d="M21 12a9 9 0 0 1-9 9 9.75 9.75 0 0 1-6.74-2.74L3 16"/><path d="M8 16H3v5"/></svg>
    </button>
    <button class="icon-btn" onclick="showStatusModal()" title="Index Info">
      <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><line x1="12" y1="16" x2="12" y2="12"/><line x1="12" y1="8" x2="12.01" y2="8"/></svg>
    </button>
    <button id="sidebarToggleBtn" class="icon-btn" onclick="toggleSidebar()" title="Toggle results panel">
      <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="18" height="18" rx="2"/><line x1="9" y1="3" x2="9" y2="21"/></svg>
    </button>
  </div>
  <div id="main">
    <div id="left">
      <div id="status">
        <div id="scope-chip">
          <svg width="9" height="9" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M22 19a2 2 0 0 1-2 2H4a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h5l2 3h9a2 2 0 0 1 2 2z"/></svg>
          <span id="scope-label"></span>
          <button id="scope-clear" onclick="clearScope()" title="Clear scope">×</button>
        </div>
        <span id="status-count"></span>
        <div id="sort-ctrl">
          <button class="sort-btn active" id="sort-rel" onclick="setSort('relevance')" title="Sort by relevance">relevance</button>
          <button class="sort-btn" id="sort-date" onclick="setSort('date')" title="Sort by modified date">date</button>
        </div>
      </div>
      <div id="results"></div>
    </div>
    <div id="resizer">
      <div id="toggle-sidebar" title="Toggle sidebar">‹</div>
    </div>
    <div id="preview">
      <div id="preview-header">
        <span id="preview-path"></span>
        <span id="preview-mtime"></span>
        <button id="copyBtn" onclick="copyPath()" title="Copy path">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="9" y="9" width="13" height="13" rx="2"/><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/></svg>
        </button>
        <div id="view-btns">
          <button id="editBtn" onclick="toggleEdit()">Edit <kbd>⌘E</kbd></button>
          <button onclick="openFile(false)">Open <kbd>⌘O</kbd></button>
          <button onclick="openFile(true)">Reveal <kbd>⌘⇧F</kbd></button>
        </div>
        <div id="edit-btns" style="display:none">
          <button id="saveBtn" onclick="saveFile()">Save <kbd>⌘S</kbd></button>
          <button id="cancelEditBtn" onclick="cancelEdit()">Cancel <kbd>esc</kbd></button>
          <span id="save-status"></span>
        </div>
      </div>
      <div id="preview-scroll">
        <div id="preview-content" class="markdown-body placeholder">Select a document to preview</div>
      </div>
      <div id="editor-mount"></div>
    </div>
  </div>

<script>
let debounceTimer;
let previewTimer;
let copyTimer;
let currentResults = [];
let displayedResults = [];
let selectedIndex = -1;
let currentScope = null;
let sortMode = 'relevance';
let lastBadge = 'keyword';
let _folders = null;
let currentQueryFetch = null;

const box = document.getElementById('searchBox');
const resultsEl = document.getElementById('results');
const statusEl = document.getElementById('status-count');
const spinnerEl = document.getElementById('spinner');
const previewContent = document.getElementById('preview-content');
const previewHeader = document.getElementById('preview-header');
const previewPath = document.getElementById('preview-path');
const previewScroll = document.getElementById('preview-scroll');
const copyBtn = document.getElementById('copyBtn');

const COPY_ICON = copyBtn.innerHTML;
const CHECK_ICON = '<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"/></svg>';

let _toastTimer = null;
function showToast(msg, persist) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('visible');
  if (_toastTimer) clearTimeout(_toastTimer);
  if (!persist) _toastTimer = setTimeout(() => t.classList.remove('visible'), 4000);
}
function hideToast() {
  const t = document.getElementById('toast');
  t.classList.remove('visible');
  if (_toastTimer) { clearTimeout(_toastTimer); _toastTimer = null; }
}

async function runCommand(cmd) {
  showToast('Reindexing…', true);
  try {
    const res = await fetch('/api/update', { method: 'POST' });
    showToast('Reindex complete ✓');
    _folders = null; // invalidate folder cache
  } catch(e) {
    showToast('Error: ' + e.message);
  }
}

async function showStatusModal() {
  const modal = document.getElementById('status-modal');
  const body  = document.getElementById('status-modal-body');
  body.textContent = 'Loading…';
  modal.showModal();
  try {
    const res = await fetch('/api/status');
    body.textContent = (await res.text()).trim() || '(no output)';
  } catch(e) {
    body.textContent = 'Error: ' + e.message;
  }
}

box.focus();

const urlParams = new URLSearchParams(window.location.search);
const initialQ = urlParams.get('q');
if (initialQ) {
  box.value = initialQ;
  doSearch(initialQ, 'instant');
} else {
  document.body.classList.add('landing');
}

function exitLanding() {
  if (document.body.classList.contains('landing')) {
    document.body.classList.remove('landing');
  }
}

function updateUrl(q) {
  const url = new URL(window.location);
  if (q.trim()) {
    url.searchParams.set('q', q.trim());
  } else {
    url.searchParams.delete('q');
  }
  window.history.replaceState({}, '', url);
}

box.addEventListener('input', () => {
  exitLanding();
  clearTimeout(debounceTimer);
  const q = box.value;
  if (q.trim()) {
    spinnerEl.textContent = 'searching…';
    spinnerEl.style.display = 'inline';
  }
  debounceTimer = setTimeout(() => {
    updateUrl(q);
    doSearch(q, 'instant');
  }, 250);
});

box.addEventListener('keydown', (e) => {
  if (e.key === 'Enter') {
    e.preventDefault();
    updateUrl(box.value);
    doSearch(box.value, 'deep');
  } else if (e.key === 'Escape' && !isEditing) {
    if (currentQueryFetch) { currentQueryFetch.abort(); currentQueryFetch = null; }
    clearTimeout(debounceTimer);
    spinnerEl.style.display = 'none';
    spinnerEl.textContent = 'deep search…';
    box.value = '';
    updateUrl('');
    resultsEl.innerHTML = '';
    statusEl.textContent = '';
    currentResults = [];
    selectedIndex = -1;
    document.getElementById('sort-ctrl').classList.remove('visible');
    previewContent.className = 'markdown-body placeholder';
    previewContent.textContent = 'Select a document to preview';
    previewHeader.style.display = 'none';
    document.body.classList.add('landing');
  }
});

document.addEventListener('keydown', (e) => {
  if (e.metaKey && e.key === 'o') {
    e.preventDefault();
    openFile(false);
  } else if (e.metaKey && e.shiftKey && e.key.toLowerCase() === 'f') {
    e.preventDefault();
    openFile(true);
  } else if (e.metaKey && e.key === 'e') {
    e.preventDefault();
    if (displayedResults[selectedIndex]) toggleEdit();
  } else if (e.metaKey && e.key === 's') {
    e.preventDefault();
    if (isEditing) saveFile();
  } else if (e.key === 'Escape' && isEditing) {
    cancelEdit();
  } else if ((e.key === 'ArrowDown' || e.key === 'ArrowUp') && !isEditing) {
    const active = document.activeElement;
    if (active && active !== box && (active.tagName === 'INPUT' || active.tagName === 'TEXTAREA')) return;
    e.preventDefault();
    setSelection(e.key === 'ArrowDown' ? selectedIndex + 1 : selectedIndex - 1);
  }
});

async function doSearch(q, tier) {
  if (!q.trim()) {
    spinnerEl.style.display = 'none';
    if (!document.body.classList.contains('landing')) {
      loadAllFiles();
    } else {
      resultsEl.innerHTML = '';
      statusEl.textContent = '';
      currentResults = [];
      document.getElementById('sort-ctrl').classList.remove('visible');
    }
    return;
  }

  if (tier === 'deep') {
    spinnerEl.textContent = 'deep search…';
    spinnerEl.style.display = 'inline';
    const timer = setTimeout(() => {
      spinnerEl.textContent = 'warming models (~10s)…';
    }, 2000);

    if (currentQueryFetch) currentQueryFetch.abort();
    currentQueryFetch = new AbortController();

    try {
      const res = await fetch('/api/query', {
        method: 'POST',
        headers: {'Content-Type': 'application/json'},
        body: JSON.stringify({q}),
        signal: currentQueryFetch.signal
      });
      clearTimeout(timer);
      spinnerEl.style.display = 'none';
      spinnerEl.textContent = 'deep search…';
      if (!res.ok) {
        const text = await res.text();
        showError(text);
        return;
      }
      currentResults = await res.json();
      renderResults('semantic');
    } catch (e) {
      clearTimeout(timer);
      spinnerEl.style.display = 'none';
      spinnerEl.textContent = 'deep search…';
      if (e.name !== 'AbortError') showError(e.message);
    }
  } else {
    try {
      const res = await fetch('/api/search?q=' + encodeURIComponent(q));
      spinnerEl.style.display = 'none';
      spinnerEl.textContent = 'deep search…';
      if (!res.ok) {
        showError(await res.text());
        return;
      }
      currentResults = await res.json();
      renderResults('keyword');
    } catch(e) {
      spinnerEl.style.display = 'none';
      spinnerEl.textContent = 'deep search…';
      showError(e.message);
    }
  }
}

async function loadAllFiles() {
  spinnerEl.textContent = 'loading…';
  spinnerEl.style.display = 'inline';
  try {
    const res = await fetch('/api/files');
    spinnerEl.style.display = 'none';
    spinnerEl.textContent = 'deep search…';
    if (!res.ok) { showError(await res.text()); return; }
    currentResults = await res.json();
    renderResults('all');
  } catch(e) {
    spinnerEl.style.display = 'none';
    spinnerEl.textContent = 'deep search…';
    showError(e.message);
  }
}

function showError(msg) {
  statusEl.textContent = 'error';
  resultsEl.innerHTML = '<div class="error" style="padding:16px">' + escapeHtml(msg) + '</div>';
}

function cleanSnippet(s) {
  // strip qmd's "@@ -1,3 @@ (0 before, 202 after)" diff-header noise
  return (s || '').replace(/^@@[^\n]*\n?/, '').trim();
}

function setSort(mode) {
  sortMode = mode;
  document.getElementById('sort-rel').classList.toggle('active', mode === 'relevance');
  document.getElementById('sort-date').classList.toggle('active', mode === 'date');
  if (currentResults.length) renderResults(lastBadge);
}

function renderResults(badgeText) {
  lastBadge = badgeText;
  let filtered = currentScope
    ? currentResults.filter(r => r.file.startsWith(currentScope + '/') || r.file === currentScope)
    : [...currentResults];

  if (sortMode === 'date') {
    filtered.sort((a, b) => (b.mtime || '').localeCompare(a.mtime || ''));
  }
  displayedResults = filtered;

  const sortCtrl = document.getElementById('sort-ctrl');
  sortCtrl.classList.toggle('visible', currentResults.length > 0);

  if (displayedResults.length === 0) {
    const total = currentResults.length;
    statusEl.textContent = (total > 0 ? `0 of ${total}` : '0') + ' results · ' + badgeText;
    resultsEl.innerHTML = '<div class="placeholder" style="padding:16px">No results' + (currentScope ? ' in this folder' : '') + '</div>';
    selectedIndex = -1;
    return;
  }

  const scopedNote = (currentScope && displayedResults.length < currentResults.length)
    ? ` of ${currentResults.length}` : '';
  statusEl.textContent = displayedResults.length + scopedNote + ' results · ' + badgeText;

  resultsEl.innerHTML = displayedResults.map((r, i) => {
    const badge = sortMode === 'date' && r.mtime
      ? formatMtime(new Date(r.mtime))
      : (r.score ? Math.round(r.score * 100) + '%' : '');
    return `
      <div class="result" id="res-${i}" onclick="setSelection(${i})">
        <div class="result-title">
          <span class="name">${escapeHtml(r.title || r.file.split('/').pop())}</span>
          <span class="result-score">${badge}</span>
        </div>
        <div class="result-path">${escapeHtml(friendlyPath(r.file))}</div>
        <div class="result-snippet">${escapeHtml(cleanSnippet(r.snippet))}</div>
      </div>
    `;
  }).join('');

  setSelection(0);
}

function setSelection(i) {
  if (i < 0 || i >= displayedResults.length) return;

  const prev = document.getElementById('res-' + selectedIndex);
  if (prev) prev.classList.remove('selected');

  selectedIndex = i;
  const next = document.getElementById('res-' + selectedIndex);
  if (next) {
    next.classList.add('selected');
    next.scrollIntoView({block: 'nearest'});
  }

  clearTimeout(previewTimer);
  previewTimer = setTimeout(loadPreview, 100);
}

async function loadPreview() {
  const r = displayedResults[selectedIndex];
  if (!r) return;

  if (isEditing) cancelEdit();

  previewContent.className = 'markdown-body placeholder';
  previewContent.textContent = 'Loading…';

  try {
    const res = await fetch('/api/raw?file=' + encodeURIComponent(r.file));
    if (!res.ok) throw new Error(await res.text());
    const text = await res.text();
    const mtime = res.headers.get('X-File-Mtime');

    previewContent.className = 'markdown-body';
    if (window.marked) {
      previewContent.innerHTML = marked.parse(text);
    } else {
      previewContent.innerHTML = '<pre>' + escapeHtml(text) + '</pre>';
    }
    previewPath.textContent = friendlyPath(r.file);
    document.getElementById('preview-mtime').textContent = mtime ? formatMtime(new Date(mtime)) : '';
    previewHeader.style.display = 'flex';
    previewScroll.scrollTop = 0;
  } catch(e) {
    previewContent.innerHTML = '<div class="error">' + escapeHtml(e.message) + '</div>';
  }
}

async function copyPath() {
  const r = displayedResults[selectedIndex];
  if (!r) return;
  try {
    await navigator.clipboard.writeText(r.file);
    copyBtn.innerHTML = CHECK_ICON;
    copyBtn.classList.add('copied');
    clearTimeout(copyTimer);
    copyTimer = setTimeout(() => {
      copyBtn.innerHTML = COPY_ICON;
      copyBtn.classList.remove('copied');
    }, 1200);
  } catch(e) {
    // clipboard API can fail on non-secure contexts; select the text instead
    const range = document.createRange();
    range.selectNodeContents(previewPath);
    const sel = window.getSelection();
    sel.removeAllRanges();
    sel.addRange(range);
  }
}

async function openFile(reveal) {
  const r = displayedResults[selectedIndex];
  if (!r) return;

  await fetch('/api/open', {
    method: 'POST',
    headers: {'Content-Type': 'application/json'},
    body: JSON.stringify({file: r.file, reveal})
  });
}

// ── editor ───────────────────────────────────────────────────────────────────

const editorMount = document.getElementById('editor-mount');
const editBtn = document.getElementById('editBtn');
const saveBtn = document.getElementById('saveBtn');
const cancelEditBtn = document.getElementById('cancelEditBtn');
const saveStatus = document.getElementById('save-status');
const viewBtns = document.getElementById('view-btns');
const editBtns = document.getElementById('edit-btns');

let isEditing = false;
let editorView = null;
let _cm = null;

async function loadCM() {
  if (_cm) return _cm;
  const [
    { EditorView, keymap, lineNumbers, highlightActiveLine, drawSelection },
    { history, historyKeymap, defaultKeymap, indentWithTab },
    { markdown },
    { syntaxHighlighting, defaultHighlightStyle, bracketMatching, indentOnInput },
    { oneDark },
  ] = await Promise.all([
    import('https://esm.sh/@codemirror/view@6'),
    import('https://esm.sh/@codemirror/commands@6'),
    import('https://esm.sh/@codemirror/lang-markdown@6'),
    import('https://esm.sh/@codemirror/language@6'),
    import('https://esm.sh/@codemirror/theme-one-dark@6'),
  ]);
  _cm = { EditorView, keymap, lineNumbers, highlightActiveLine, drawSelection,
          history, historyKeymap, defaultKeymap, indentWithTab,
          markdown, syntaxHighlighting, defaultHighlightStyle, bracketMatching,
          indentOnInput, oneDark };
  return _cm;
}

function setEditMode(on) {
  isEditing = on;
  previewScroll.style.display = on ? 'none' : '';
  editorMount.style.display = on ? 'flex' : 'none';
  viewBtns.style.display = on ? 'none' : '';
  editBtns.style.display = on ? '' : 'none';
  if (!on) saveStatus.textContent = '';
}

async function toggleEdit() {
  if (isEditing) { cancelEdit(); return; }

  const r = displayedResults[selectedIndex];
  if (!r) {
    previewContent.className = 'markdown-body error';
    previewContent.textContent = 'No document selected.';
    return;
  }

  editBtn.textContent = 'Loading…';
  editBtn.disabled = true;

  // Show loading state in preview area — CM modules take ~8s on first load
  const wasShowingPreview = previewScroll.style.display !== 'none';
  if (wasShowingPreview && !_cm) {
    previewContent.className = 'markdown-body placeholder';
    previewContent.textContent = 'Loading editor…';
  }

  try {
    const [cm, res] = await Promise.all([
      loadCM(),
      fetch('/api/raw?file=' + encodeURIComponent(r.file)),
    ]);
    if (!res.ok) throw new Error(await res.text());
    const text = await res.text();
    const { EditorView, keymap, lineNumbers, highlightActiveLine, drawSelection,
            history, historyKeymap, defaultKeymap, indentWithTab,
            markdown, syntaxHighlighting, defaultHighlightStyle, bracketMatching,
            indentOnInput, oneDark } = cm;

    if (editorView) { editorView.destroy(); editorView = null; }

    const isDark = window.matchMedia('(prefers-color-scheme: dark)').matches;
    editorView = new EditorView({
      doc: text,
      extensions: [
        lineNumbers(),
        drawSelection(),
        highlightActiveLine(),
        bracketMatching(),
        indentOnInput(),
        history(),
        syntaxHighlighting(defaultHighlightStyle),
        isDark ? oneDark : [],
        keymap.of([...defaultKeymap, ...historyKeymap, indentWithTab]),
        markdown(),
        EditorView.lineWrapping,
      ],
      parent: editorMount,
    });

    setEditMode(true);
    editorView.focus();
  } catch(e) {
    previewContent.innerHTML = '<div class="error">' + escapeHtml(e.message) + '</div>';
  } finally {
    editBtn.textContent = 'Edit';
    editBtn.disabled = false;
  }
}

function cancelEdit() {
  if (editorView) { editorView.destroy(); editorView = null; }
  setEditMode(false);
  loadPreview();
}

async function saveFile() {
  const r = displayedResults[selectedIndex];
  if (!r || !editorView) return;

  const content = editorView.state.doc.toString();
  saveBtn.disabled = true;
  saveStatus.className = '';
  saveStatus.textContent = 'saving…';

  try {
    const res = await fetch('/api/save', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ file: r.file, content }),
    });
    if (!res.ok) throw new Error(await res.text());

    saveStatus.className = 'ok';
    saveStatus.textContent = 'saved ✓';
    setTimeout(() => cancelEdit(), 800);
  } catch(e) {
    saveStatus.className = 'err';
    saveStatus.textContent = e.message;
  } finally {
    saveBtn.disabled = false;
  }
}

// ── sidebar resize & collapse ────────────────────────────────────────────────

const leftEl = document.getElementById('left');
const resizerEl = document.getElementById('resizer');
const toggleBtn = document.getElementById('toggle-sidebar');

const SIDEBAR_MIN = 200;
const SIDEBAR_MAX = Math.round(window.innerWidth * 0.4);

let sidebarCollapsed = false;
let savedWidth = null;

const COLLAPSE_THRESHOLD = 120; // px — drag below this to collapse

const sidebarToggleBtn = document.getElementById('sidebarToggleBtn');

function syncSidebarBtn() {
  sidebarToggleBtn.classList.toggle('active', sidebarCollapsed);
  sidebarToggleBtn.title = sidebarCollapsed ? 'Show results panel' : 'Hide results panel';
}

function toggleSidebar() {
  sidebarCollapsed ? expand() : collapse();
}

function collapse() {
  savedWidth = leftEl.style.width || leftEl.offsetWidth + 'px';
  leftEl.classList.add('collapsed');
  toggleBtn.textContent = '›';
  sidebarCollapsed = true;
  syncSidebarBtn();
}

function expand(toWidth) {
  leftEl.classList.remove('collapsed');
  const w = toWidth || savedWidth || SIDEBAR_MIN + 'px';
  leftEl.style.width = (typeof w === 'number') ? w + 'px' : w;
  toggleBtn.textContent = '‹';
  sidebarCollapsed = false;
  syncSidebarBtn();
}

toggleBtn.addEventListener('click', (e) => {
  e.stopPropagation();
  sidebarCollapsed ? expand() : collapse();
});

resizerEl.addEventListener('mousedown', (e) => {
  if (e.target === toggleBtn) return;
  e.preventDefault();
  resizerEl.classList.add('dragging');

  // if collapsed, we start from 0 so any rightward drag expands
  const startX = e.clientX;
  const startW = sidebarCollapsed ? 0 : leftEl.offsetWidth;

  function onMove(e) {
    const desired = startW + (e.clientX - startX);
    if (desired < COLLAPSE_THRESHOLD) {
      // snap to collapsed while dragging so user sees feedback
      if (!sidebarCollapsed) leftEl.classList.add('collapsed');
    } else {
      if (sidebarCollapsed) leftEl.classList.remove('collapsed');
      const clamped = Math.max(SIDEBAR_MIN, Math.min(SIDEBAR_MAX, desired));
      leftEl.style.width = clamped + 'px';
    }
  }

  function onUp(e) {
    resizerEl.classList.remove('dragging');
    document.removeEventListener('mousemove', onMove);
    document.removeEventListener('mouseup', onUp);
    document.body.style.cursor = '';
    document.body.style.userSelect = '';

    const finalW = startW + (e.clientX - startX);
    if (finalW < COLLAPSE_THRESHOLD) {
      collapse();
    } else {
      expand(Math.max(SIDEBAR_MIN, Math.min(SIDEBAR_MAX, finalW)));
    }
  }

  document.addEventListener('mousemove', onMove);
  document.addEventListener('mouseup', onUp);
  document.body.style.cursor = 'col-resize';
  document.body.style.userSelect = 'none';
});

// ── scope / folder filter ─────────────────────────────────────────────────────

const RECENT_SCOPE_KEY = 'qmd-recent-scopes';
function getRecentScopes() {
  try { return JSON.parse(localStorage.getItem(RECENT_SCOPE_KEY)) || []; } catch { return []; }
}
function saveRecentScope(path) {
  const r = [path, ...getRecentScopes().filter(p => p !== path)].slice(0, 5);
  localStorage.setItem(RECENT_SCOPE_KEY, JSON.stringify(r));
}

async function loadFolders() {
  if (_folders) return _folders;
  try { const res = await fetch('/api/folders'); _folders = await res.json(); }
  catch { _folders = []; }
  return _folders;
}

function toggleScopePicker() {
  const picker = document.getElementById('scope-picker');
  picker.classList.contains('open') ? closeScopePicker() : openScopePicker();
}

async function openScopePicker() {
  const picker = document.getElementById('scope-picker');
  const input = document.getElementById('scope-input');
  picker.classList.add('open');
  input.value = '';
  input.focus();
  renderScopeList('');
  await loadFolders();
  renderScopeList(input.value);
}

function closeScopePicker() {
  document.getElementById('scope-picker').classList.remove('open');
}

function matchFolderFilter(path, filter) {
  const parts = filter.trim().toLowerCase().split(/\s+/).filter(Boolean);
  return parts.every(p => path.toLowerCase().includes(p));
}

function renderScopeList(filter) {
  const list = document.getElementById('scope-list');
  const folders = _folders || [];
  const recent = getRecentScopes();
  const opt = path =>
    `<div class="scope-option" data-path="${escapeHtml(path)}" title="${escapeHtml(path)}">${escapeHtml(friendlyPath(path))}</div>`;

  if (!filter.trim()) {
    let html = '';
    if (recent.length) {
      html += '<div class="scope-section">Recent</div>' + recent.map(opt).join('');
    }
    const others = folders.filter(p => !recent.includes(p));
    if (others.length) {
      html += '<div class="scope-section">All folders</div>' + others.slice(0, 10).map(opt).join('');
    }
    list.innerHTML = html || '<div class="scope-option" style="color:var(--dim);cursor:default;font-family:inherit">Loading…</div>';
  } else {
    const matches = folders.filter(p => matchFolderFilter(p, filter));
    list.innerHTML = matches.length
      ? matches.slice(0, 60).map(opt).join('')
      : '<div class="scope-option" style="color:var(--dim);cursor:default;font-family:inherit">No folders match</div>';
  }
}

document.getElementById('scope-list').addEventListener('click', e => {
  const opt = e.target.closest('.scope-option[data-path]');
  if (opt) setScope(opt.dataset.path);
});

document.getElementById('scope-input').addEventListener('input', e => {
  renderScopeList(e.target.value);
});

document.addEventListener('click', e => {
  const wrap = document.getElementById('scope-wrap');
  if (wrap && !wrap.contains(e.target)) closeScopePicker();
}, true);

function setScope(path) {
  currentScope = path;
  saveRecentScope(path);
  document.getElementById('scope-chip').classList.add('active');
  document.getElementById('scope-label').textContent = friendlyPath(path);
  document.getElementById('scopeBtn').classList.add('active');
  closeScopePicker();
  if (currentResults.length) renderResults(lastBadge);
}

function clearScope() {
  currentScope = null;
  document.getElementById('scope-chip').classList.remove('active');
  document.getElementById('scopeBtn').classList.remove('active');
  if (currentResults.length) renderResults(lastBadge);
}

function formatMtime(d) {
  const now = new Date();
  const diff = now - d;
  const mins = Math.floor(diff / 60000);
  const hours = Math.floor(diff / 3600000);
  const days = Math.floor(diff / 86400000);
  if (mins < 1) return 'just now';
  if (mins < 60) return `${mins}m ago`;
  if (hours < 24) return `${hours}h ago`;
  if (days < 7) return `${days}d ago`;
  return d.toLocaleDateString(undefined, { month: 'short', day: 'numeric', year: d.getFullYear() !== now.getFullYear() ? 'numeric' : undefined });
}

let _home = '';
fetch('/api/config').then(r => r.json()).then(c => { _home = c.home; }).catch(() => {});

function friendlyPath(file) {
  if (_home && file.startsWith(_home)) return '~' + file.slice(_home.length);
  return file.replace(/^\/Users\/[^/]+/, '~'); // fallback for macOS before config loads
}

function escapeHtml(str) {
  return String(str).replace(/[&<>'"]/g,
    tag => ({
      '&': '&amp;',
      '<': '&lt;',
      '>': '&gt;',
      "'": '&#39;',
      '"': '&quot;'
    }[tag])
  );
}
