appId: com.qmd-ui.app
productName: qmd-ui
copyright: "qmd-ui contributors"

# ── What goes inside the asar archive ────────────────────────────────────────
files:
  - main.js
  - preload.js
  - setup.html
  - prefs.html
  - assets/**
  # Strip packages that are large and not needed for basic search/indexing:
  # node-llama-cpp — only used by `qmd embed` with a local LLM model (optional feature)
  - "!**/node_modules/node-llama-cpp/**"
  - "!**/node_modules/@node-llama-cpp/**"
  # typescript — compiler, never needed at runtime
  - "!**/node_modules/typescript/**"
  # better-sqlite3 build sources — keep only the compiled .node binary
  - "!**/node_modules/better-sqlite3/deps/**"
  - "!**/node_modules/better-sqlite3/src/**"
  - "!**/node_modules/better-sqlite3/binding.gyp"

# ── Outside asar so the qmd child process (ELECTRON_RUN_AS_NODE) can open them
# Unpack everything: qmd.js resolves all its imports (fast-glob, yaml, zod, etc.)
# at runtime from real FS paths. Files excluded via `files` are not present at all,
# so this only enlarges the unpacked set by whatever is actually included.
asarUnpack:
  - "node_modules/**"

# ── Files placed in Resources/ outside the asar ──────────────────────────────
extraResources:
  # Web server + UI (referenced by main.js via process.resourcesPath)
  - from: ../server.mjs
    to: server.mjs
  - from: ../index.html
    to: index.html

# ── Native module rebuild ─────────────────────────────────────────────────────
# Disable electron-builder's auto-rebuild (it would try to compile ALL native modules,
# including tree-sitter-* which fail and which we use via WASM anyway).
# The CI explicitly runs @electron/rebuild -o better-sqlite3 before each arch build.
npmRebuild: false

# ── Post-pack hook to fix native module arch if electron-builder replaced it ──
afterPack: ./afterPack.js

# ── macOS ─────────────────────────────────────────────────────────────────────
mac:
  category: public.app-category.productivity
  hardenedRuntime: true
  entitlements: build/entitlements.mac.plist
  entitlementsInherit: build/entitlements.mac.plist
  # Disable electron-builder's asar integrity embedding — the hash it computes doesn't
  # match the final asar due to a build-order issue, causing Electron to reject child
  # processes (including ELECTRON_RUN_AS_NODE spawns) at runtime.
  asarIntegrity: false
  # Notarize after signing — requires APPLE_ID + APPLE_APP_SPECIFIC_PASSWORD env vars
  notarize: true
  target:
    - target: dmg
      arch: [arm64, x64]
    - target: zip    # electron-updater needs the zip for delta updates
      arch: [arm64, x64]

dmg:
  background: null
  window:
    width: 540
    height: 380

# ── Auto-update via GitHub Releases ──────────────────────────────────────────
publish:
  provider: github
  owner: pushdrop
  repo: qmd-ui
